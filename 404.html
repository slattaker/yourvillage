<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />

    <script>
      const path =
        window.location.pathname +
        window.location.search +
        window.location.hash;

      sessionStorage.setItem(
        "github-pages-redirect",
        path
      );

      window.location.replace("/");
    </script>
  </head>

  <body></body>
</html>
